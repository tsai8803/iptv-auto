name: IPTV Update

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.x

    - name: Install requests
      run: pip install requests

    - name: Run checker
      run: python check.py

    - name: Commit result
      run: |
        git config --global user.name "iptv-bot"
        git config --global user.email "bot@example.com"
        git add tsai-tv2.txt
        git commit -m "update tv list"
        git push
    - name: 上传到腾讯云 COS
      uses: zkqiang/tencent-cos-action@v0.1.0
      with:
        args: upload ./tsai-tv2.txt tsai-tv2.txt  
        secret_id: ${{ secrets.COS_SECRET_ID }}
        secret_key: ${{ secrets.COS_SECRET_KEY }}
        bucket: tsai-1255449709
        region: ap-guangzhou
